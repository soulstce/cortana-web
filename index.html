<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020617" />
    <title>Cortana Web</title>
    <meta name="description" content="A blue-and-black Cortana-style web app with a glowing orb and voice loop." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <button id="orbButton" class="orb-wrap orb-button" type="button" aria-label="Hold to talk">
          <span class="orb"></span>
          <span class="orb-ring"></span>
        </button>
        <p class="eyebrow">iOS Web App Architect</p>
        <h1>Cortana Web</h1>
        <p class="subtitle">Hold to talk, record with MediaRecorder, and route the voice loop through Poke.</p>
        <div class="status-row">
          <span class="status-dot" id="apiDot"></span>
          <span id="apiStatus">Voice ready</span>
        </div>
      </section>

      <section class="chat card">
        <div id="messages" class="messages" aria-live="polite"></div>
        <div class="voice-row">
          <button id="talkButton" class="talk-button" type="button">Hold to Talk</button>
          <span id="transcript" class="transcript">Say something to begin.</span>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
